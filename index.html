<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>FSD / SSD Analyzer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080d14;
        --surface: #0f1824;
        --surface2: #162032;
        --border: #1e3048;
        --accent: #38bdf8;
        --accent2: #818cf8;
        --danger: #f87171;
        --success: #34d399;
        --text: #e2eaf4;
        --muted: #6b8aaa;
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        min-height: 100vh;
        padding: 16px;
      }

      h1 {
        font-family: "Syne", sans-serif;
        font-size: clamp(24px, 7vw, 42px);
        font-weight: 800;
        letter-spacing: -1px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        padding-bottom: 4px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
        margin-bottom: 20px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        margin-top: 16px;
      }

      .card-title {
        font-family: "Syne", sans-serif;
        font-size: 16px;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
      }

      .card-title .sub {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        font-weight: 400;
      }

      /* ── TOOLBAR ── */
      .toolbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 14px;
      }

      .btn {
        border: none;
        border-radius: 10px;
        padding: 14px 12px;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition:
          opacity 0.15s,
          transform 0.1s;
        -webkit-tap-highlight-color: transparent;
        min-height: 48px;
      }

      .btn:active {
        transform: scale(0.96);
        opacity: 0.85;
      }

      .btn-primary {
        background: linear-gradient(135deg, #1e40af, #2563eb);
        color: white;
      }
      .btn-secondary {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-danger {
        background: linear-gradient(135deg, #991b1b, #dc2626);
        color: white;
      }
      .btn-success {
        background: linear-gradient(135deg, #065f46, #059669);
        color: white;
      }
      .btn-full {
        grid-column: 1 / -1;
      }

      /* ── INPUT TABLE ── */
      .input-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 10px;
        border: 1px solid var(--border);
      }

      .input-grid {
        display: table;
        width: 100%;
        border-collapse: collapse;
        min-width: max-content;
      }

      .input-grid tr {
        display: table-row;
      }

      .input-grid th {
        background: var(--surface2);
        padding: 10px 8px;
        font-size: 11px;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        text-align: center;
      }

      .input-grid td {
        padding: 4px;
        border-bottom: 1px solid var(--border);
      }

      .input-grid tr:last-child td {
        border-bottom: none;
      }

      .row-label {
        background: var(--surface2);
        padding: 8px 12px;
        font-size: 12px;
        color: var(--accent2);
        font-weight: 700;
        white-space: nowrap;
        text-align: center;
        border-right: 1px solid var(--border);
      }

      .cell-input {
        background: transparent;
        border: none;
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        padding: 10px 6px;
        text-align: center;
        width: 72px;
        -webkit-appearance: none;
        appearance: none;
        outline: none;
      }

      .cell-input:focus {
        background: var(--surface2);
        border-radius: 6px;
      }

      .del-btn {
        background: none;
        border: none;
        color: var(--danger);
        font-size: 18px;
        padding: 8px 12px;
        cursor: pointer;
        min-width: 44px;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
      }

      /* ── VALIDATION ── */
      .validation {
        margin-top: 10px;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
      }

      .validation.ok {
        background: #052e16;
        color: var(--success);
        border: 1px solid #166534;
      }
      .validation.err {
        background: #3b0000;
        color: var(--danger);
        border: 1px solid #7f1d1d;
      }

      /* ── PRECISION ── */
      .precision-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: var(--muted);
      }

      .precision-label {
        color: var(--muted);
      }

      .precision-btns {
        display: flex;
        gap: 4px;
      }

      .prec-btn {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.1s;
      }

      .prec-btn:active {
        background: var(--border);
      }

      .prec-val {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 13px;
        min-width: 28px;
        text-align: center;
        color: var(--accent);
        font-weight: 700;
      }

      /* ── RESULT TABLES ── */
      .table-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin-top: 10px;
      }

      .data-table {
        border-collapse: collapse;
        font-size: 12px;
        min-width: 100%;
      }

      .data-table th {
        background: var(--surface2);
        padding: 8px 10px;
        border: 1px solid var(--border);
        color: var(--muted);
        white-space: nowrap;
        font-size: 11px;
        font-weight: 600;
      }

      .data-table td {
        border: 1px solid var(--border);
        padding: 8px 10px;
        text-align: center;
        white-space: nowrap;
      }

      .data-table .row-th {
        background: var(--surface2);
        color: var(--accent2);
        font-weight: 700;
        padding: 8px 12px;
      }

      /* ── DISTINCT VALUES ── */
      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .badge {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 600;
        color: var(--accent);
      }

      /* ── RESULT PILLS ── */
      .result-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
      }

      .result-pill {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #000;
        font-family: "Syne", sans-serif;
        font-size: 18px;
        font-weight: 800;
        padding: 12px 20px;
        border-radius: 12px;
      }

      .result-data {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        font-size: 12px;
        color: var(--muted);
        overflow-x: auto;
      }

      /* ── LOGS ── */
      .log {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        max-height: 300px;
        overflow-y: auto;
        font-size: 11px;
        line-height: 1.7;
        white-space: pre-wrap;
        word-break: break-word;
        -webkit-overflow-scrolling: touch;
      }

      /* ── DIVIDER ── */
      .divider {
        height: 1px;
        background: var(--border);
        margin: 14px 0;
      }
    </style>
  </head>
  <body>
    <h1>FSD/SSD</h1>
    <div class="subtitle">Analyzer — mobile friendly</div>

    <!-- INPUT -->
    <div class="card">
      <div class="card-title">Dane wejściowe</div>

      <div class="toolbar">
        <button class="btn btn-primary" onclick="addRow()">＋ Wiersz</button>
        <button class="btn btn-primary" onclick="addColumn()">
          ＋ Kolumna
        </button>
        <button class="btn btn-danger" onclick="removeLastColumn()">
          － Kolumna
        </button>
        <button class="btn btn-danger" onclick="deleteAllData()">
          🗑 Wyczyść
        </button>
        <button class="btn btn-success btn-full" onclick="recalculate()">
          ♻️ Przelicz
        </button>
      </div>

      <div class="input-scroll">
        <table class="input-grid" id="input-table"></table>
      </div>

      <div id="validation"></div>
    </div>

    <!-- SORTED -->
    <div class="card">
      <div class="card-title">
        Sorted rows
        <div class="precision-row">
          <span class="precision-label">precyzja</span>
          <div class="precision-btns">
            <button class="prec-btn" onclick="changePrecision('sorted', -1)">
              −
            </button>
            <div class="prec-val" id="prec-sorted">1</div>
            <button class="prec-btn" onclick="changePrecision('sorted', 1)">
              +
            </button>
          </div>
        </div>
      </div>
      <div class="table-scroll"><div id="sorted-table"></div></div>
    </div>

    <!-- DISTINCT -->
    <div class="card">
      <div class="card-title">Distinct values</div>
      <div class="badges" id="distinct-values"></div>
    </div>

    <!-- FSD -->
    <div class="card">
      <div class="card-title">
        FSD table
        <div class="precision-row">
          <span class="precision-label">precyzja</span>
          <div class="precision-btns">
            <button class="prec-btn" onclick="changePrecision('fsd', -1)">
              −
            </button>
            <div class="prec-val" id="prec-fsd">1</div>
            <button class="prec-btn" onclick="changePrecision('fsd', 1)">
              +
            </button>
          </div>
        </div>
      </div>
      <div class="table-scroll"><div id="fsd-table"></div></div>
    </div>

    <!-- SSD -->
    <div class="card">
      <div class="card-title">
        SSD table
        <span class="sub">tylko niezdominowane FSD</span>
        <div class="precision-row">
          <span class="precision-label">precyzja</span>
          <div class="precision-btns">
            <button class="prec-btn" onclick="changePrecision('ssd', -1)">
              −
            </button>
            <div class="prec-val" id="prec-ssd">1</div>
            <button class="prec-btn" onclick="changePrecision('ssd', 1)">
              +
            </button>
          </div>
        </div>
      </div>
      <div class="table-scroll"><div id="ssd-table"></div></div>
    </div>

    <!-- RESULT -->
    <div class="card">
      <div class="card-title">Wynik SSD</div>
      <div id="result"></div>
    </div>

    <!-- LOGS -->
    <div class="card">
      <div class="card-title">Logi</div>
      <div class="log" id="logs"></div>
    </div>

    <script>
      const STORAGE_KEY = "fsd-ssd-data";

      let INPUT_DATA = loadData();
      const PRECISION = { sorted: 1, fsd: 1, ssd: 1 };

      // ── STORAGE ──
      function loadData() {
        try {
          const s = localStorage.getItem(STORAGE_KEY);
          if (s) return JSON.parse(s);
        } catch (e) {}
        return [[0, 0]];
      }

      function saveData() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(INPUT_DATA));
        } catch (e) {}
      }

      // ── PRECISION ──
      function changePrecision(table, delta) {
        const cur = PRECISION[table];
        const next = Math.max(0, Math.min(10, cur + delta));
        PRECISION[table] = next;
        document.getElementById("prec-" + table).textContent = next;
        recalculate();
      }

      function fmt(v, table) {
        return Number(v).toFixed(PRECISION[table] ?? 1);
      }

      // ── LOGS ──
      function log(...args) {
        document.getElementById("logs").textContent += args.join(" ") + "\n";
      }
      function clearLogs() {
        document.getElementById("logs").textContent = "";
      }

      // ── DATA MANIPULATION ──
      function addRow() {
        const cols = Math.max(...INPUT_DATA.map((r) => r.length), 1);
        INPUT_DATA.push(Array(cols).fill(0));
        saveData();
        renderInputTable();
      }

      function removeRow(i) {
        INPUT_DATA.splice(i, 1);
        if (INPUT_DATA.length === 0) INPUT_DATA = [[0]];
        saveData();
        renderInputTable();
        recalculate();
      }

      function addColumn() {
        INPUT_DATA.forEach((r) => r.push(0));
        saveData();
        renderInputTable();
      }

      function removeLastColumn() {
        INPUT_DATA.forEach((r) => {
          if (r.length > 1) r.pop();
        });
        saveData();
        renderInputTable();
        recalculate();
      }

      function deleteAllData() {
        if (!confirm("Wyczyścić wszystkie dane?")) return;
        localStorage.removeItem(STORAGE_KEY);
        INPUT_DATA = [[0, 0]];
        renderInputTable();
        recalculate();
      }

      function updateCell(row, col, value) {
        if (!INPUT_DATA[row]) return;
        // Allow negative: parse as float
        const v = value === "" || value === "-" ? 0 : parseFloat(value);
        INPUT_DATA[row][col] = isNaN(v) ? 0 : v;
        saveData();
      }

      // ── RENDER INPUT TABLE ──
      function renderInputTable() {
        const table = document.getElementById("input-table");
        const cols = Math.max(...INPUT_DATA.map((r) => r.length), 1);

        let html = "<thead><tr><th></th>";
        for (let c = 0; c < cols; c++) html += `<th>K${c + 1}</th>`;
        html += "<th></th></tr></thead><tbody>";

        INPUT_DATA.forEach((row, ri) => {
          html += `<tr><td class="row-label">A${ri + 1}</td>`;
          for (let c = 0; c < cols; c++) {
            const val = row[c] ?? 0;
            html += `<td style="padding:4px">
            <input
              class="cell-input"
              type="text"
              inputmode="decimal"
              value="${val}"
              onblur="updateCell(${ri},${c},this.value)"
              onkeydown="if(event.key==='Enter'){this.blur()}"
            />
          </td>`;
          }
          html += `<td><button class="del-btn" onclick="removeRow(${ri})">✕</button></td></tr>`;
        });

        html += "</tbody>";
        table.innerHTML = html;
        validateData();
      }

      // ── VALIDATION ──
      function validateData() {
        const el = document.getElementById("validation");
        const lengths = INPUT_DATA.map((r) => r.length);
        const ok = lengths.every((l) => l === lengths[0]);
        el.className = "validation " + (ok ? "ok" : "err");
        el.textContent = ok
          ? "✅ Dane poprawne"
          : "❌ Wszystkie wiersze muszą mieć tyle samo kolumn";
        return ok;
      }

      // ── RENDER RESULT TABLE ──
      function renderTable(containerId, rows, headers, rowLabels, tableName) {
        const el = document.getElementById(containerId);
        if (!rows.length) {
          el.innerHTML =
            '<div style="color:var(--muted);font-size:12px;padding:8px">Brak danych</div>';
          return;
        }

        let html = '<table class="data-table"><thead><tr><th></th>';
        headers.forEach((h) => (html += `<th>${h}</th>`));
        html += "</tr></thead><tbody>";

        rows.forEach((row, ri) => {
          const label = rowLabels ? rowLabels[ri] : `A${ri + 1}`;
          html += `<tr><td class="row-th">${label}</td>`;
          row.forEach((v) => (html += `<td>${fmt(v, tableName)}</td>`));
          html += "</tr>";
        });

        html += "</tbody></table>";
        el.innerHTML = html;
      }

      // ── FSD ──
      function isDominanteFSD(
        row,
        checkRow,
        rowIndex,
        checkRowIndex,
        uniqueValues,
      ) {
        log(`[FSD] Czy A${rowIndex + 1} dominuje A${checkRowIndex + 1}?`);
        for (let i = 0; i < row.length; i++) {
          if (row[i] - checkRow[i] > 1e-10) {
            const x = uniqueValues[i];
            log(
              `  ❌ NIE: F_A${rowIndex + 1}(${x}) = ${fmt(row[i], "fsd")} > F_A${checkRowIndex + 1}(${x}) = ${fmt(checkRow[i], "fsd")}`,
            );
            return false;
          }
        }
        log(`  ✅ TAK`);
        return true;
      }

      function getUndominatedByFSD(fsdTable, uniqueValues) {
        const dominated = Array(fsdTable.length).fill(false);
        for (let i = 0; i < fsdTable.length; i++) {
          for (let j = 0; j < fsdTable.length; j++) {
            if (i === j) continue;
            if (isDominanteFSD(fsdTable[i], fsdTable[j], i, j, uniqueValues)) {
              dominated[j] = true;
              log(`  ➡️ A${j + 1} zdominowane przez A${i + 1}`);
            }
          }
        }
        return fsdTable
          .map((row, index) => ({ row, index }))
          .filter(({ index }) => !dominated[index]);
      }

      // ── SSD ──
      function isDominanteSSD(
        row,
        checkRow,
        uniqueValues,
        rowIndex,
        checkRowIndex,
      ) {
        log(`[SSD] Czy A${rowIndex + 1} dominuje A${checkRowIndex + 1}?`);
        const rI = [0],
          cI = [0];
        for (let i = 1; i < row.length; i++) {
          const d = uniqueValues[i] - uniqueValues[i - 1];
          rI.push(rI[i - 1] + d * row[i - 1]);
          cI.push(cI[i - 1] + d * checkRow[i - 1]);
        }
        for (let i = 0; i < rI.length; i++) {
          if (rI[i] - cI[i] > 1e-10) {
            const x = uniqueValues[i];
            log(
              `  ❌ NIE: ∫A${rowIndex + 1}(${x}) = ${fmt(rI[i], "ssd")} > ∫A${checkRowIndex + 1}(${x}) = ${fmt(cI[i], "ssd")}`,
            );
            return false;
          }
        }
        log(`  ✅ TAK`);
        return true;
      }

      function getUndominatedBySSD(uniqueValues, entries) {
        const rows = entries.map((e) => e.row);
        const dominated = Array(rows.length).fill(false);
        for (let i = 0; i < rows.length; i++) {
          for (let j = 0; j < rows.length; j++) {
            if (i === j) continue;
            if (
              isDominanteSSD(
                rows[i],
                rows[j],
                uniqueValues,
                entries[i].index,
                entries[j].index,
              )
            ) {
              dominated[j] = true;
              log(
                `  ➡️ SSD: A${entries[j].index + 1} zdominowane przez A${entries[i].index + 1}`,
              );
            }
          }
        }
        return entries.filter((_, idx) => !dominated[idx]);
      }

      // ── MAIN ──
      function recalculate() {
        clearLogs();
        if (!validateData()) return;

        const n = INPUT_DATA[0].length;
        const sortedRows = INPUT_DATA.map((r) => [...r].sort((a, b) => a - b));

        renderTable(
          "sorted-table",
          sortedRows,
          Array.from({ length: n }, (_, i) => i + 1),
          null,
          "sorted",
        );

        const uniqueValues = [...new Set(sortedRows.flat())].sort(
          (a, b) => a - b,
        );

        document.getElementById("distinct-values").innerHTML = uniqueValues
          .map((v) => `<span class="badge">${v}</span>`)
          .join("");

        // FSD
        const fsd = sortedRows.map((row) =>
          uniqueValues.map((val) => row.filter((v) => v <= val).length / n),
        );
        renderTable("fsd-table", fsd, uniqueValues, null, "fsd");

        const fsdEntries = getUndominatedByFSD(fsd, uniqueValues);

        // SSD — only FSD-undominated
        const ssdTable = fsdEntries.map(({ row }) => {
          const integrals = [0];
          for (let i = 1; i < row.length; i++) {
            const d = uniqueValues[i] - uniqueValues[i - 1];
            integrals.push(integrals[i - 1] + d * row[i - 1]);
          }
          return integrals;
        });

        renderTable(
          "ssd-table",
          ssdTable,
          uniqueValues,
          fsdEntries.map((e) => `A${e.index + 1}`),
          "ssd",
        );

        const ssdEntries = getUndominatedBySSD(uniqueValues, fsdEntries);

        const indices = ssdEntries.map((e) => e.index + 1);
        const result = ssdEntries.map((e) => INPUT_DATA[e.index]);

        document.getElementById("result").innerHTML = `
        <div class="result-pills">
          ${indices.map((i) => `<div class="result-pill">A${i}</div>`).join("")}
        </div>
        <div class="result-data">${JSON.stringify(result, null, 2)}</div>
      `;

        log("\n=== WYNIK KOŃCOWY ===");
        indices.forEach((i) => log(`✅ A${i} niezdominowane`));

        saveData();
      }

      renderInputTable();
      recalculate();
    </script>
  </body>
</html>
